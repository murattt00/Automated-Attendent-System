version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: yoklama-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: university_attendance
      MYSQL_USER: yoklama_user
      MYSQL_PASSWORD: Gims1234.
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - yoklama-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: yoklama-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - yoklama-network

  # Backend API
  backend:
    build: ./backend
    container_name: yoklama-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_USER: yoklama_user
      DB_PASSWORD: Gims1234.
      DB_NAME: university_attendance
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-minimum-32-characters
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      QR_ROTATION_INTERVAL: 30000
      QR_TOKEN_EXPIRY: 30000
      MAX_DISTANCE_METERS: 100
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - yoklama-network

  # Frontend Nuxt
  frontend:
    build: ./frontend
    container_name: yoklama-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3001
      NUXT_PUBLIC_SOCKET_URL: http://localhost:3001
    ports:
      - "3000:3000"
    networks:
      - yoklama-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  yoklama-network:
    driver: bridge
