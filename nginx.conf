# ===========================================
# Nginx Configuration for University Attendance System
# ===========================================
# This configuration sets up:
# - SSL/TLS encryption
# - Reverse proxy for backend API
# - Static frontend serving
# - WebSocket support for Socket.IO
# - Security headers
# - Gzip compression
# ===========================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=attendance:10m rate=20r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream backends
upstream backend_api {
    server 127.0.0.1:3001 fail_timeout=10s max_fails=3;
    # For multiple backend instances (load balancing):
    # server 127.0.0.1:3002 fail_timeout=10s max_fails=3;
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:3000 fail_timeout=10s max_fails=3;
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL/TLS Configuration
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self)" always;

    # Logging
    access_log /var/log/nginx/attendance_access.log;
    error_log /var/log/nginx/attendance_error.log warn;

    # Max body size (for file uploads if needed)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Connection limits
    limit_conn addr 10;

    # Backend API proxy
    location /api/ {
        # Rate limiting
        limit_req zone=general burst=20 nodelay;

        # Stricter rate limiting for auth endpoints
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://backend_api;
            include /etc/nginx/proxy_params_attendance;
        }

        # Stricter rate limiting for attendance endpoints
        location /api/attendance/ {
            limit_req zone=attendance burst=10 nodelay;
            proxy_pass http://backend_api;
            include /etc/nginx/proxy_params_attendance;
        }

        # General API endpoints
        proxy_pass http://backend_api;
        include /etc/nginx/proxy_params_attendance;
    }

    # Socket.IO WebSocket proxy
    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # WebSocket specific timeouts
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        send_timeout 90s;
    }

    # Health check endpoint (bypass rate limiting)
    location = /api/health {
        proxy_pass http://backend_api;
        access_log off;
    }

    # Frontend application
    location / {
        proxy_pass http://frontend;
        include /etc/nginx/proxy_params_attendance;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

